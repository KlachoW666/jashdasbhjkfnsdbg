# Проверка API после сборки: поднять backend и вызвать check-api (health + zyphex/rate + опционально wallet/admin).
# Запуск: push/PR в main или вручную (workflow_dispatch).
name: API check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: promt/backend/package-lock.json

      - name: Install backend deps
        working-directory: promt/backend
        run: |
          npm ci 2>/dev/null || npm install

      - name: Start backend
        working-directory: promt/backend
        run: |
          npm start &
          for i in $(seq 1 30); do
            curl -sf http://localhost:3001/api/health >/dev/null && break
            sleep 1
          done
          sleep 2

      - name: Run API checks
        working-directory: promt/backend
        env:
          BASE_URL: http://localhost:3001
        run: npm run check-api
