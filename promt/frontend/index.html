<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>WEVOX Auto</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
      // Automatically expand Telegram WebApp when initialized
      if (window.Telegram && window.Telegram.WebApp) {
        var tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        // Match app theme: header and background (WEVOX dark #0D1117)
        if (tg.setHeaderColor) tg.setHeaderColor('#0D1117');
        if (tg.setBackgroundColor) tg.setBackgroundColor('#0D1117');
        var colorScheme = tg.colorScheme || 'dark';
        if (colorScheme === 'dark') {
          document.documentElement.classList.add('dark');
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
